name: Release to npm

# Tag-driven release. Push a `npm-vX.Y.Z` tag that matches the version
# already committed in engine/src/dsc/version.py and this workflow:
#
#   1. Builds the dsc CLI binary on each platform runner via PyInstaller
#   2. Assembles each @devseccode/scanner-<platform>-<arch> tarball
#   3. Publishes every platform package FIRST
#   4. Publishes the parent @devseccode/scanner LAST (so optionalDependencies
#      always resolve on the first user `npx`)
#
# Publishes the public DevSecCode CLI package. The package is publicly
# downloadable from npm for frictionless `npx @devseccode/scanner scan .`, while
# the license remains proprietary.
#
# Requires:
#   secrets.NPM_TOKEN              -- automation token for npmjs.com with
#                                     publish rights for @devseccode/*
#   environment: npm               -- manual approval gate before publish
# Optional (macOS notarization, recommended but skippable on day one):
#   secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12  (base64 .p12)
#   secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD
#   secrets.APPLE_ID
#   secrets.APPLE_TEAM_ID
#   secrets.APPLE_APP_PASSWORD

on:
  push:
    tags:
      - "npm-v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack tarballs but skip npm publish"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: darwin-arm64
          # darwin-x64 (Intel Mac) is intentionally omitted: GitHub retired
          # the macos-13 runner image and no Intel Mac runner remains in
          # the hosted pool. Add back via self-hosted or paid CI when
          # there is enough Intel demand to justify the hosting cost.
          - runner: ubuntu-24.04
            target: linux-x64
          - runner: ubuntu-24.04-arm
            target: linux-arm64
          - runner: windows-2022
            target: win32-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install engine + PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e "engine/[dev]"
          pip install pyinstaller

      # Download the platform-matched OpenGrep binary so PyInstaller can
      # bundle it into the dsc executable. Without this step the spec's
      # `_opengrep_bin.exists()` check is False and the resulting binary
      # crashes at runtime with "opengrep binary not found".
      - name: Setup OpenGrep
        shell: bash
        run: bash engine/vendor/opengrep/setup.sh

      - name: Build CLI binary
        shell: bash
        run: bash npm-dist/scripts/build-binary.sh "${{ matrix.target }}"

      # macOS code-signing + notarization. The step is a no-op when the
      # APPLE_* secrets are not configured -- the binary still ships, just
      # without a Developer ID signature, and Gatekeeper will prompt on
      # first launch. Add the secrets once an Apple Developer ID Application
      # cert is in place.
      - name: Sign + notarize (macOS)
        if: startsWith(matrix.target, 'darwin-')
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        shell: bash
        run: |
          if [ -z "${APPLE_CERT_P12:-}" ]; then
            echo "::warning::APPLE_DEVELOPER_ID_APPLICATION_CERT_P12 not set; skipping codesign + notarize. Users on a fresh Mac will hit Gatekeeper on first launch."
            exit 0
          fi
          bash npm-dist/scripts/sign-and-notarize-macos.sh "${{ matrix.target }}"

      - name: Assemble platform package
        shell: bash
        run: bash npm-dist/scripts/assemble-platform-pkg.sh "${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.target }}
          path: npm-dist/packages/scanner-${{ matrix.target }}/
          if-no-files-found: error

  verify-versions:
    name: Version sanity check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches engine version
        shell: bash
        run: |
          REF="${GITHUB_REF##*/}"          # npm-v0.4.1
          TAG_VERSION="${REF#npm-v}"        # 0.4.1
          ENGINE_VERSION="$(bash npm-dist/scripts/version.sh)"
          echo "Tag:    $TAG_VERSION"
          echo "Engine: $ENGINE_VERSION"
          if [ "$TAG_VERSION" != "$ENGINE_VERSION" ]; then
            echo "::error::npm-v$TAG_VERSION does not match engine/src/dsc/version.py ($ENGINE_VERSION)."
            exit 1
          fi
        if: startsWith(github.ref, 'refs/tags/npm-v')

  publish:
    name: Publish to npm
    needs: [build, verify-versions]
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - uses: actions/download-artifact@v4
        with:
          path: npm-dist/_artifacts/

      # The build job uploaded each platform dir as pkg-<target>; copy
      # them back into npm-dist/packages/scanner-<target>/ so the same scripts
      # the dev runs locally also work here.
      - name: Restore platform packages
        shell: bash
        run: |
          for d in npm-dist/_artifacts/pkg-*; do
            target="${d#npm-dist/_artifacts/pkg-}"
            dest="npm-dist/packages/scanner-$target"
            mkdir -p "$dest"
            cp -R "$d"/* "$dest"/
            ls -la "$dest/bin/" || true
          done

      - name: Stamp parent version
        shell: bash
        run: bash npm-dist/scripts/stamp-parent-version.sh

      - name: Publish
        if: github.event_name == 'push' || github.event.inputs.dry_run == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: bash npm-dist/scripts/publish-all.sh

      - name: Dry-run publish (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: bash npm-dist/scripts/publish-all.sh --dry-run

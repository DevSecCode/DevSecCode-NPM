- id: deva.cwe-327.java-weak-cipher
  languages:
  - java
  severity: WARNING
  message: 'Weak cryptographic primitive detected. Avoid DES / 3DES / RC4 /

    Blowfish / ECB mode. Use AES-GCM (or AES-CBC with HMAC).

    '
  metadata:
    cwe: CWE-327
    deva:
      precision_tier: A
  mode: search
  patterns:
  - pattern-either:
    - pattern: javax.crypto.Cipher.getInstance($ALG)
    - pattern: javax.crypto.Cipher.getInstance($ALG, $P)
    - pattern: Cipher.getInstance($ALG)
    - pattern: Cipher.getInstance($ALG, $P)
    - pattern: javax.crypto.KeyGenerator.getInstance($ALG)
    - pattern: javax.crypto.KeyGenerator.getInstance($ALG, $P)
    - pattern: KeyGenerator.getInstance($ALG)
    - pattern: KeyGenerator.getInstance($ALG, $P)
    - pattern: javax.crypto.SecretKeyFactory.getInstance($ALG)
    - pattern: javax.crypto.SecretKeyFactory.getInstance($ALG, $P)
    - pattern: SecretKeyFactory.getInstance($ALG)
    - pattern: SecretKeyFactory.getInstance($ALG, $P)
  - metavariable-regex:
      metavariable: $ALG
      regex: ^"(DES|DESede|3DES|TripleDES|RC2|RC4|ARCFOUR|Blowfish)([/_-].*)?"$|^".*\bECB\b.*"$

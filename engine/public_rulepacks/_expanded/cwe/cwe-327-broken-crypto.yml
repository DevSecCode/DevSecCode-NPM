# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.cwe-327.python-weak-hash
  languages:
  - python
  severity: WARNING
  message: 'Weak cryptographic hash function (MD5 / SHA-1) used. These are

    not collision-resistant and must not be used for password

    storage, signatures, or integrity checks. Use SHA-256 or SHA-3

    for hashing; bcrypt / scrypt / argon2 for passwords. If the use

    is genuinely non-security (e.g., HTTP digest-auth protocol

    compat) pass usedforsecurity=False to silence this rule.

    '
  metadata:
    cwe: CWE-327
    owasp: A02:2021 - Cryptographic Failures
    deva:
      precision_tier: A
      triage_hint: 'MD5 / SHA-1 are common for non-security uses: cache keys,

        content-addressable storage, file dedup, ETag generation,

        deterministic ID hashing. If the digest flows into a

        comparison-with-stored-hash, signature verification,

        password storage, or session/token derivation, mark

        confirmed. If it labels a cache slot, computes a file

        fingerprint, or is passed `usedforsecurity=False`, mark

        probably_false_positive.

        '
  mode: search
  patterns:
  - pattern-either:
    - pattern: hashlib.md5(...)
    - pattern: hashlib.sha1(...)
    - pattern: hashlib.new("md5", ...)
    - pattern: hashlib.new("sha1", ...)
    - pattern: hashlib.new("MD5", ...)
    - pattern: hashlib.new("SHA1", ...)
    - pattern: hashlib.new("SHA-1", ...)
    - pattern: Crypto.Hash.MD5.new(...)
    - pattern: Crypto.Hash.SHA1.new(...)
  - pattern-not: hashlib.md5(..., usedforsecurity=False, ...)
  - pattern-not: hashlib.sha1(..., usedforsecurity=False, ...)
  - pattern-not: hashlib.new(..., usedforsecurity=False, ...)
- id: deva.cwe-327.python-weak-cipher
  languages:
  - python
  severity: ERROR
  message: 'Weak symmetric cipher (DES / 3DES / RC4 / Blowfish-with-defaults)

    detected. Replace with AES-GCM or ChaCha20-Poly1305 from

    cryptography.hazmat.

    '
  metadata:
    cwe: CWE-327
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: Crypto.Cipher.DES.new(...)
  - pattern: Crypto.Cipher.DES3.new(...)
  - pattern: Crypto.Cipher.ARC4.new(...)
  - pattern: Crypto.Cipher.Blowfish.new(...)
  - pattern: cryptography.hazmat.primitives.ciphers.algorithms.TripleDES(...)
  - pattern: algorithms.TripleDES(...)
  - pattern: algorithms.ARC4(...)
  - pattern: algorithms.Blowfish(...)

# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.cwe-22.python-path-traversal
  languages:
  - python
  severity: ERROR
  message: 'User-controlled input flows into a file-system path operation

    without realpath/resolve guarding. An attacker can use ../ or

    absolute paths to access files outside the intended directory.

    Validate the resolved path against an allow-listed base.

    '
  metadata:
    cwe: CWE-22
    owasp: A01:2021 - Broken Access Control
    deva:
      precision_tier: A
      triage_hint: 'Path traversal is exploitable when user input controls the

        file-system path and the resolution does not pin to an

        allow-listed base directory. Mark confirmed when the source

        flows unchanged into open / read / send_file. Mark

        probably_false_positive when the value passes through

        os.path.basename, werkzeug.secure_filename, a strict regex

        allow-list, or Path.resolve() compared to a fixed base, or

        when the surrounding code is a test / fixture file.

        '
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $REQ.GET[...]
      - pattern: $REQ.POST[...]
      - pattern: $REQ.args[...]
      - pattern: $REQ.form[...]
      - pattern: $REQ.values[...]
      - pattern: $REQ.params[...]
      - pattern: flask.request.args.get(...)
      - pattern: flask.request.form.get(...)
      - pattern: request.args.get(...)
      - pattern: request.form.get(...)
      - pattern: request.GET.get(...)
      - pattern: request.POST.get(...)
      - pattern: input(...)
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: open($PATH, ...)
      - pattern: os.open($PATH, ...)
      - pattern: pathlib.Path($PATH).open(...)
      - pattern: pathlib.Path($PATH).read_text(...)
      - pattern: pathlib.Path($PATH).read_bytes(...)
      - pattern: open($BASE + $PATH, ...)
      - pattern: open(f"...{$PATH}...", ...)
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: os.path.realpath(...)
      - pattern: os.path.commonpath(...)
      - pattern: pathlib.Path(...).resolve(...)
      - pattern: werkzeug.utils.secure_filename(...)
      - pattern: secure_filename(...)

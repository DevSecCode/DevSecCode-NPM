- id: deva.cwe-78.rust-command-injection
  languages:
  - rust
  severity: ERROR
  message: 'User-controlled input flows into Rust''s std::process::Command.

    Pass arguments via .arg(value) on separate calls instead of

    shelling out to "sh -c <string>".

    '
  metadata:
    cwe: CWE-78
    deva:
      precision_tier: B
  mode: search
  patterns:
  - pattern-either:
    - pattern: 'std::process::Command::new("sh").arg("-c").arg($X)

        '
    - pattern: 'std::process::Command::new("/bin/sh").arg("-c").arg($X)

        '
    - pattern: 'std::process::Command::new("bash").arg("-c").arg($X)

        '

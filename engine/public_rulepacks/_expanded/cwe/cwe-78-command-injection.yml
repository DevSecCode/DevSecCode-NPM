# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.cwe-78.python-command-injection
  languages:
  - python
  severity: ERROR
  message: 'User-controlled input reaches a shell-execution function. Switch

    to argv-style invocation (subprocess.run([...], shell=False)) or

    explicitly quote arguments via shlex.quote.

    '
  metadata:
    cwe: CWE-78
    owasp: A03:2021 - Injection
    deva:
      precision_tier: A
      triage_hint: 'Genuine command injection requires both an unbounded user

        source and a shell sink. Confirmed when the input flows

        unchanged into shell=True / os.system / os.popen / a

        backtick-style call. Mark likely_vulnerability when the

        input passes through type coercion (int(...), float(...))

        but no quoting -- those are still exploitable for argument

        injection. Mark probably_false_positive only if the value

        has gone through shlex.quote, has been validated against

        a strict regex / enum, or comes from a fixture / test file

        that never runs in production.

        '
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $REQ.GET[...]
      - pattern: $REQ.POST[...]
      - pattern: $REQ.args[...]
      - pattern: $REQ.form[...]
      - pattern: $REQ.values[...]
      - pattern: flask.request.args.get(...)
      - pattern: flask.request.form.get(...)
      - pattern: request.args.get(...)
      - pattern: request.form.get(...)
      - pattern: request.GET.get(...)
      - pattern: request.POST.get(...)
      - pattern: input(...)
      - pattern: sys.argv[...]
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: os.system(...)
      - pattern: os.popen(...)
      - pattern: subprocess.call(..., shell=True, ...)
      - pattern: subprocess.run(..., shell=True, ...)
      - pattern: subprocess.Popen(..., shell=True, ...)
      - pattern: subprocess.check_call(..., shell=True, ...)
      - pattern: subprocess.check_output(..., shell=True, ...)
      - pattern: commands.getoutput(...)
      - pattern: commands.getstatusoutput(...)
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: shlex.quote(...)
      - pattern: shlex.split(...)
- id: deva.cwe-78.express-command-injection

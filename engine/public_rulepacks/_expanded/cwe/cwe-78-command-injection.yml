- id: deva.cwe-78.php-command-injection
  languages:
  - php
  severity: ERROR
  message: 'User-controlled input flows into a PHP shell-execution sink.

    Use escapeshellarg / escapeshellcmd on each untrusted argument,

    or use the argv form via proc_open with bypass_shell.

    '
  metadata:
    cwe: CWE-78
    owasp: A03:2021 - Injection
    deva:
      precision_tier: A
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $_GET[...]
      - pattern: $_POST[...]
      - pattern: $_REQUEST[...]
      - pattern: $_COOKIE[...]
      - pattern: $_SERVER[...]
      - pattern: file_get_contents("php://input")
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: shell_exec($X)
      - pattern: exec($X)
      - pattern: exec($X, ...)
      - pattern: system($X)
      - pattern: system($X, ...)
      - pattern: passthru($X)
      - pattern: passthru($X, ...)
      - pattern: popen($X, ...)
      - pattern: proc_open($X, ...)
      - pattern: pcntl_exec($X, ...)
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: escapeshellarg(...)
      - pattern: escapeshellcmd(...)
- id: deva.cwe-78.go-command-injection
  languages:
  - go
  severity: ERROR
  message: 'User-controlled input flows into Go''s exec.Command. Pass arguments

    as separate argv elements rather than concatenating; never wrap a

    user string into "sh -c".

    '
  metadata:
    cwe: CWE-78
    deva:
      precision_tier: A
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $REQ.URL.Query().Get($K)
      - pattern: $REQ.FormValue($K)
      - pattern: $REQ.PostFormValue($K)
      - pattern: $REQ.Header.Get($K)
      - pattern: r.URL.Query().Get($K)
      - pattern: r.FormValue($K)
      - pattern: r.PostFormValue($K)
      - pattern: r.Header.Get($K)
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: exec.Command("sh", "-c", $X)
      - pattern: exec.Command("/bin/sh", "-c", $X)
      - pattern: exec.Command("bash", "-c", $X)
      - pattern: exec.Command("/bin/bash", "-c", $X)
      - pattern: exec.Command("cmd", "/c", $X)
      - pattern: exec.CommandContext($CTX, "sh", "-c", $X)
      - pattern: exec.CommandContext($CTX, "bash", "-c", $X)

- id: deva.cwe-78.java-command-injection
  languages:
  - java
  severity: ERROR
  message: 'User-controlled input reaches a Java shell-execution sink. Use

    ProcessBuilder with an explicit argv list rather than a single

    command string passed to Runtime.exec.

    '
  metadata:
    cwe: CWE-78
    deva:
      precision_tier: A
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $REQ.getParameter(...)
      - pattern: $REQ.getParameterValues(...)
      - pattern: $REQ.getHeader(...)
      - pattern: $REQ.getHeaders(...)
      - pattern: $REQ.getCookies()
      - pattern: $REQ.getQueryString()
      - pattern: $REQ.getInputStream()
      - pattern: $REQ.getReader()
      - pattern: $C.getValue()
      - patterns:
        - pattern-inside: '$RT $METHOD(..., @RequestParam $T1 $V1, ...) { ... }

            '
        - focus-metavariable: $V1
      - patterns:
        - pattern-inside: '$RT $METHOD(..., @PathVariable $T1 $V1, ...) { ... }

            '
        - focus-metavariable: $V1
      - patterns:
        - pattern-inside: '$RT $METHOD(..., @RequestBody $T1 $V1, ...) { ... }

            '
        - focus-metavariable: $V1
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: Runtime.getRuntime().exec($CMD)
      - pattern: java.lang.Runtime.getRuntime().exec($CMD)
      - pattern: Runtime.getRuntime().exec($CMD, $ENV)
      - pattern: Runtime.getRuntime().exec($CMD, $ENV, $DIR)
      - pattern: $RT.exec($CMD)
      - pattern: $RT.exec($CMD, $ENV)
      - pattern: $RT.exec($CMD, $ENV, $DIR)
      - pattern: new ProcessBuilder($CMD)
      - pattern: new java.lang.ProcessBuilder($CMD)
      - pattern: new ProcessBuilder($CMDS)
      - pattern: $PB.command($CMD)
      - pattern: $PB.command($CMDS)
  pattern-propagators:
  - pattern: $L.add($X)
    from: $X
    to: $L
  - pattern: $L.addAll($X)
    from: $X
    to: $L
  - pattern: $L.set($I, $X)
    from: $X
    to: $L
  - pattern: $M.put($K, $V)
    from: $V
    to: $M
  - pattern: $M.putAll($V)
    from: $V
    to: $M

      - pattern: require("child_process").execSync(...)
      - pattern: 'child_process.spawn($CMD, ..., {shell: true, ...}, ...)'
      - pattern: 'child_process.spawnSync($CMD, ..., {shell: true, ...}, ...)'
      - pattern: 'execa($CMD, ..., {shell: true, ...})'
      - pattern: execa.command($CMD, ...)
      - pattern: execa.commandSync($CMD, ...)
      - pattern: 'execaSync($CMD, ..., {shell: true, ...})'
      - pattern: shell.exec(...)
      - pattern: shelljs.exec(...)
      - pattern: require("shelljs").exec(...)
      - pattern: shellExec(...)
      - pattern: require("shell-exec")(...)
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: shellQuote.quote(...)
      - pattern: shellQuote.parse(...)
      - pattern: shescape.quote(...)
      - pattern: shescape.escape(...)
      - pattern: shellEscape($X)
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: req.query.$X
      - pattern: req.query[...]
      - pattern: req.params.$X
      - pattern: req.params[...]
      - pattern: req.body.$X
      - pattern: req.body[...]
      - pattern: req.cookies.$X
      - pattern: req.cookies[...]
      - pattern: req.headers.$X
      - pattern: req.headers[...]
      - pattern: req.signedCookies.$X
      - pattern: req.signedCookies[...]
      - pattern: req.get($X)
      - pattern: req.header($X)
      - pattern: req.file
      - pattern: req.files[...]
      - pattern: req.files.$X

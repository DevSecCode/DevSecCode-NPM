# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.cwe-319.python-http-client
  languages:
  - python
  severity: WARNING
  message: 'Hardcoded http:// URL in client request. Data on the wire can

    be observed and modified by anyone on the network path. Use

    https:// for any URL carrying credentials, tokens, or PII.

    '
  metadata:
    cwe: CWE-319
    owasp: A02:2021 - Cryptographic Failures
    deva:
      precision_tier: B
  mode: search
  patterns:
  - pattern-either:
    - pattern: requests.get($URL, ...)
    - pattern: requests.post($URL, ...)
    - pattern: requests.put($URL, ...)
    - pattern: requests.delete($URL, ...)
    - pattern: urllib.request.urlopen($URL)
    - pattern: httpx.get($URL, ...)
    - pattern: httpx.post($URL, ...)
  - metavariable-regex:
      metavariable: $URL
      regex: ^["']http://(?!(localhost|127\.0\.0\.1|0\.0\.0\.0))
- id: deva.cwe-319.javascript-http-client
  languages:
  - javascript
  - typescript
  severity: WARNING
  message: 'Hardcoded http:// URL in client request. Use https:// for any

    URL carrying credentials, tokens, or PII.

    '
  metadata:
    cwe: CWE-319
    deva:
      precision_tier: B
  mode: search
  patterns:
  - pattern-either:
    - pattern: fetch($URL, ...)
    - pattern: axios.get($URL, ...)
    - pattern: axios.post($URL, ...)
  - metavariable-regex:
      metavariable: $URL
      regex: ^["']http://(?!(localhost|127\.0\.0\.1|0\.0\.0\.0))

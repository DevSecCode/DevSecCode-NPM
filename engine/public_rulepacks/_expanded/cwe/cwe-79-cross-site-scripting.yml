rules:
- id: deva.cwe-79.python-xss
  languages:
  - python
  severity: ERROR
  message: 'User-controlled input flows into HTML output without escaping.

    Pass values through Django''s template auto-escape or use the

    built-in escape utilities; avoid mark_safe / |safe on user data.

    '
  metadata:
    cwe: CWE-79
    owasp: A03:2021 - Injection
    deva:
      precision_tier: A
      triage_hint: 'Reflected / stored XSS fires when user input lands in an

        HTML response without escaping. Mark confirmed when the

        value flows into mark_safe / |safe / Markup() / innerHTML /

        dangerouslySetInnerHTML / Html.Raw without intermediate

        escape. Mark probably_false_positive when the value passes

        through html.escape / markupsafe.escape / DOMPurify.sanitize

        / OWASP Encoder.forHtml, or when the response Content-Type

        is application/json (and the value is JSON-encoded, not

        interpolated into HTML).

        '
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $REQ.GET[...]
      - pattern: $REQ.POST[...]
      - pattern: $REQ.args[...]
      - pattern: $REQ.form[...]
      - pattern: $REQ.values[...]
      - pattern: flask.request.args.get(...)
      - pattern: flask.request.form.get(...)
      - pattern: request.args.get(...)
      - pattern: request.form.get(...)
      - pattern: request.GET.get(...)
      - pattern: request.POST.get(...)
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: django.utils.safestring.mark_safe($X)
      - pattern: mark_safe($X)
      - pattern: django.utils.html.format_html($X, ...)
      - pattern: format_html($X, ...)
      - pattern: HttpResponse($X)
      - pattern: django.http.HttpResponse($X)
      - pattern: flask.Markup($X)
      - pattern: Markup($X)
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: html.escape(...)
      - pattern: django.utils.html.escape(...)
      - pattern: markupsafe.escape(...)
      - pattern: bleach.clean(...)

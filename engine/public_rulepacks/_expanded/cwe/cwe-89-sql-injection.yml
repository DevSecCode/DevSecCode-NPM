    owasp: A03:2021 - Injection
    deva:
      precision_tier: A
  mode: taint
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: $DB.query($SQL)
      - pattern: $DB.execute($SQL)
      - pattern: connection.query($SQL)
      - pattern: connection.execute($SQL)
      - pattern: pool.query($SQL)
      - pattern: pool.execute($SQL)
      - pattern: client.query($SQL)
      - pattern: knex.raw($SQL)
      - pattern: $K.raw($SQL)
      - pattern: sequelize.query($SQL)
      - pattern: $S.query($SQL)
      - pattern: Sequelize.literal($SQL)
      - pattern: $REPO.query($SQL)
      - pattern: dataSource.query($SQL)
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: req.query.$X
      - pattern: req.query[...]
      - pattern: req.params.$X
      - pattern: req.params[...]
      - pattern: req.body.$X
      - pattern: req.body[...]
      - pattern: req.cookies.$X
      - pattern: req.cookies[...]
      - pattern: req.headers.$X
      - pattern: req.headers[...]
      - pattern: req.signedCookies.$X
      - pattern: req.signedCookies[...]
      - pattern: req.get($X)
      - pattern: req.header($X)
      - pattern: req.file
      - pattern: req.files[...]
      - pattern: req.files.$X

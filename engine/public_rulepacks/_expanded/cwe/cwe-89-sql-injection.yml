# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.cwe-89.python-sql-injection
  languages:
  - python
  severity: ERROR
  message: 'User-controlled input is interpolated into a SQL string passed to

    execute. Use parameterized queries (cursor.execute(sql, params))

    so the database driver escapes values for you.

    '
  metadata:
    cwe: CWE-89
    owasp: A03:2021 - Injection
    deva:
      precision_tier: A
      triage_hint: 'SQL injection requires a user-controlled value flowing into

        a query string without parameter binding. Mark confirmed

        when the value is concatenated, f-stringed, or %-formatted

        into the query before execute / executemany / query.

        Mark probably_false_positive when the query uses placeholder

        syntax (?, $1, :name) and the value is passed as a separate

        argument, when sqlalchemy.text(...).bindparams(...) is used,

        or when the input has gone through a strict allow-list

        validator (enum match, integer coercion, etc.).

        '
  mode: taint
  pattern-sources:
  - patterns:
    - pattern-either:
      - pattern: $REQ.GET[...]
      - pattern: $REQ.POST[...]
      - pattern: $REQ.args[...]
      - pattern: $REQ.form[...]
      - pattern: $REQ.values[...]
      - pattern: flask.request.args.get(...)
      - pattern: flask.request.form.get(...)
      - pattern: request.args.get(...)
      - pattern: request.form.get(...)
      - pattern: request.GET.get(...)
      - pattern: request.POST.get(...)
      - pattern: input(...)
  pattern-sinks:
  - patterns:
    - pattern-either:
      - pattern: $CUR.execute("..." + $X, ...)
      - pattern: $CUR.execute($X + "...", ...)
      - pattern: $CUR.execute(f"...{$X}...", ...)
      - pattern: $CUR.execute("...%s..." % $X, ...)
      - pattern: $CUR.execute("...".format($X, ...), ...)
      - pattern: $CUR.executemany("..." + $X, ...)
      - pattern: $CUR.executemany(f"...{$X}...", ...)
      - pattern: $CUR.executescript($X)
      - pattern: $DB.query("..." + $X, ...)
      - pattern: $DB.query(f"...{$X}...", ...)
  pattern-sanitizers:
  - patterns:
    - pattern-either:
      - pattern: sqlalchemy.text(...).bindparams(...)
      - pattern: $X.bindparams(...)

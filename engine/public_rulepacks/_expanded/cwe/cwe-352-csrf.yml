# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.cwe-352.flask-wtf-csrf-disabled
  languages:
  - python
  severity: ERROR
  message: 'CSRF protection is disabled in Flask-WTF. State-changing routes

    become vulnerable to cross-site request forgery. Re-enable

    CSRFProtect or set WTF_CSRF_ENABLED=True.

    '
  metadata:
    cwe: CWE-352
    owasp: A01:2021 - Broken Access Control
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: $APP.config["WTF_CSRF_ENABLED"] = False
  - pattern: $APP.config.update(WTF_CSRF_ENABLED=False, ...)
  - pattern: WTF_CSRF_ENABLED = False
- id: deva.cwe-352.django-csrf-exempt
  languages:
  - python
  severity: WARNING
  message: 'View decorated with @csrf_exempt skips Django''s CSRF check.

    Confirm the route is genuinely safe (e.g., callback from a

    signed webhook with its own integrity check) and document the

    reason.

    '
  metadata:
    cwe: CWE-352
    deva:
      precision_tier: B
  mode: search
  pattern-either:
  - pattern: "@csrf_exempt\ndef $F(...):\n  ...\n"
  - pattern: "@django.views.decorators.csrf.csrf_exempt\ndef $F(...):\n  ...\n"
- id: deva.cwe-352.rails-skip-forgery-protection
  languages:
  - ruby
  severity: ERROR
  message: 'Rails controller skips CSRF token verification. The

    `protect_from_forgery` filter (or its skip) controls whether

    session-authenticated state-changing requests require an

    authenticity token; skipping it on a controller that handles

    POST / PUT / PATCH / DELETE leaves the action vulnerable.

    '
  metadata:
    cwe: CWE-352
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: skip_before_action :verify_authenticity_token
  - pattern: skip_forgery_protection
  - pattern: 'protect_from_forgery with: :null_session'
  - pattern: 'protect_from_forgery except: $X'
  - pattern: 'skip_before_action :verify_authenticity_token, only: $X'
- id: deva.cwe-352.laravel-csrf-bypass
  languages:
  - php
  severity: ERROR
  message: 'Laravel route excluded from VerifyCsrfToken middleware. Verify

    that the route uses an alternate authentication mechanism

    (signed payload, JWT, Sanctum) before whitelisting it.

    '
  metadata:
    cwe: CWE-352
    deva:
      precision_tier: A
  mode: search
  patterns:
  - pattern-either:
    - pattern: Route::withoutMiddleware([$X])
    - pattern: Route::withoutMiddleware($X)
    - pattern: $ROUTE->withoutMiddleware([$X])
    - pattern: $ROUTE->withoutMiddleware($X)
  - metavariable-regex:
      metavariable: $X
      regex: VerifyCsrfToken
- id: deva.cwe-352.aspnetcore-ignore-antiforgery
  languages:
  - csharp
  severity: ERROR
  message: 'ASP.NET Core action / controller is decorated with

    [IgnoreAntiforgeryToken] (or equivalent), bypassing the global

    antiforgery filter on a state-changing endpoint.

    '
  metadata:
    cwe: CWE-352
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: '[IgnoreAntiforgeryToken]

      public $RT $METHOD(...) { ... }

      '
  - pattern: '[IgnoreAntiforgeryToken(Order = $N)]

      public $RT $METHOD(...) { ... }

      '
  - pattern: $APP.UseEndpoints($R => { $R.MapControllers().DisableAntiForgery(); ...
      })
- id: deva.cwe-352.nestjs-csrf-disabled
  languages:
  - typescript
  severity: ERROR
  message: 'NestJS bootstrap explicitly disables CSURF / csrf-csrf middleware

    on the global app or removes it from a specific module.

    '
  metadata:
    cwe: CWE-352
    deva:
      precision_tier: B
  mode: search
  pattern-either:
  - pattern: '$APP.use(csurf({ ignoreMethods: [''GET'', ''HEAD'', ''OPTIONS'', ''POST'',
      ''PUT'', ''PATCH'', ''DELETE''] }))'
  - pattern: 'csurf({ disable: true })'
  - pattern: 'csurf({ ignoreMethods: $METHODS })'
- id: deva.cwe-352.express-csrf-disabled
  languages:
  - javascript
  - typescript
  severity: ERROR
  message: 'Express CSRF middleware (csurf) configured to ignore the methods

    that actually need protection. Remove the override or restrict it

    to GET/HEAD/OPTIONS only.

    '
  metadata:
    cwe: CWE-352
    deva:
      precision_tier: B
  mode: search
  pattern-either:
  - pattern: 'csurf({ ignoreMethods: [''POST'', ''PUT'', ''DELETE'', ...] })'
  - pattern: 'csurf({ ignoreMethods: [''POST''] })'
  - pattern: 'csurf({ ignoreMethods: [''POST'', ''PUT''] })'

# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.cwe-611.python-lxml-resolve-entities
  languages:
  - python
  severity: ERROR
  message: 'lxml parser is configured to resolve external entities (the

    default before lxml 4.0 and still possible explicitly). XML

    external entity attacks can read local files, exfiltrate data

    to an attacker-controlled host, or cause SSRF. Use

    lxml.etree.XMLParser(resolve_entities=False) and / or

    defusedxml.

    '
  metadata:
    cwe: CWE-611
    owasp: A05:2021 - Security Misconfiguration
    deva:
      precision_tier: A
      triage_hint: 'XXE is exploitable when an XML parser resolves external

        entities while parsing untrusted XML. Mark confirmed when

        the parser is constructed with resolve_entities=True /

        load_dtd=True and consumes input from a request body, file

        upload, or message queue. Mark probably_false_positive when

        the import is from defusedxml.* (whose parsers refuse

        entity resolution by default), when secure-processing flags

        are set elsewhere on the same parser via setFeature(...),

        or when the parser only consumes hard-coded internal XML.

        '
  mode: search
  pattern-either:
  - pattern: lxml.etree.XMLParser(..., resolve_entities=True, ...)
  - pattern: lxml.etree.XMLParser(..., load_dtd=True, ...)
  - pattern: xml.sax.make_parser()
  - pattern: xml.dom.minidom.parseString($X)
  - pattern: xml.dom.minidom.parse($X)
  - pattern: xml.etree.ElementTree.parse($X)
  - pattern: xml.etree.ElementTree.fromstring($X)
  - pattern: xml.etree.ElementTree.XMLParser()
- id: deva.cwe-611.java-xml-default-parser
  languages:
  - java
  severity: ERROR
  message: 'SAXParserFactory / DocumentBuilderFactory created without

    disabling external-entity resolution. Set

    FEATURE_SECURE_PROCESSING and disable

    external-general-entities / external-parameter-entities, or use

    OWASP''s XmlSecurityProperties helper.

    '
  metadata:
    cwe: CWE-611
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: javax.xml.parsers.SAXParserFactory.newInstance()
  - pattern: SAXParserFactory.newInstance()
  - pattern: javax.xml.parsers.DocumentBuilderFactory.newInstance()
  - pattern: DocumentBuilderFactory.newInstance()
  - pattern: javax.xml.transform.TransformerFactory.newInstance()
  - pattern: TransformerFactory.newInstance()
- id: deva.cwe-611.php-xml-noent
  languages:
  - php
  severity: ERROR
  message: 'LIBXML_NOENT enables external entity resolution, exposing PHP

    XML parsing to XXE. Drop the flag and rely on the default

    (entity-resolution disabled) parser behavior.

    '
  metadata:
    cwe: CWE-611
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: $D->loadXML($X, LIBXML_NOENT)
  - pattern: $D->load($X, LIBXML_NOENT)
  - pattern: simplexml_load_string($X, $C, LIBXML_NOENT)
  - pattern: simplexml_load_file($X, $C, LIBXML_NOENT)
- id: deva.cwe-611.ruby-nokogiri-noent
  languages:
  - ruby
  severity: ERROR
  message: 'Nokogiri parsed with NOENT resolves external entities. Remove

    the option or call .noent to ensure default-safe parsing.

    '
  metadata:
    cwe: CWE-611
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: Nokogiri::XML($X) { |c| c.noblanks.dtdload.noent }
  - pattern: Nokogiri::XML::Document.parse($X, nil, nil, Nokogiri::XML::ParseOptions::NOENT)
  - pattern: Nokogiri.XML($X, nil, nil, Nokogiri::XML::ParseOptions::NOENT)
- id: deva.cwe-611.csharp-xml-xxe
  languages:
  - csharp
  severity: ERROR
  message: 'XmlDocument or XmlReader configured with DtdProcessing.Parse

    enables XXE. Set DtdProcessing = DtdProcessing.Prohibit and

    XmlResolver = null.

    '
  metadata:
    cwe: CWE-611
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: $S.DtdProcessing = DtdProcessing.Parse
  - pattern: $S.DtdProcessing = System.Xml.DtdProcessing.Parse
  - pattern: $D.XmlResolver = new XmlUrlResolver()
  - pattern: $D.XmlResolver = new System.Xml.XmlUrlResolver()
- id: deva.cwe-611.kotlin-xml-default-parser
  languages:
  - kotlin
  severity: ERROR
  message: 'SAXParserFactory / DocumentBuilderFactory created without

    disabling external-entity resolution. Disable

    external-general-entities and external-parameter-entities and

    set FEATURE_SECURE_PROCESSING.

    '
  metadata:
    cwe: CWE-611
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern: SAXParserFactory.newInstance()
  - pattern: javax.xml.parsers.SAXParserFactory.newInstance()
  - pattern: DocumentBuilderFactory.newInstance()
  - pattern: javax.xml.parsers.DocumentBuilderFactory.newInstance()
  - pattern: TransformerFactory.newInstance()
  - pattern: javax.xml.transform.TransformerFactory.newInstance()

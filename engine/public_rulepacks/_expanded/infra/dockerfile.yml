# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.infra.dockerfile-runs-as-root
  languages:
  - dockerfile
  severity: WARNING
  message: 'Container will run as root. Without an explicit non-root USER

    directive, processes inside the container start as UID 0,

    expanding the blast radius of any compromise. Add USER nonroot

    (or a numeric UID) before the CMD / ENTRYPOINT.

    '
  metadata:
    cwe: CWE-250
    owasp: A05:2021 - Security Misconfiguration
    deva:
      precision_tier: B
  mode: search
  pattern: USER root
- id: deva.infra.dockerfile-apt-no-install-recommends
  languages:
  - dockerfile
  severity: INFO
  message: 'apt-get install without --no-install-recommends pulls many extra

    packages, increasing the attack surface and image size. Add

    --no-install-recommends and purge /var/lib/apt/lists in the same

    RUN.

    '
  metadata:
    cwe: CWE-1188
    deva:
      precision_tier: C
  mode: search
  patterns:
  - pattern: RUN apt-get install ...
  - pattern-not: RUN apt-get install ... --no-install-recommends ...
- id: deva.infra.dockerfile-add-remote-url
  languages:
  - dockerfile
  severity: INFO
  message: 'ADD with a remote URL fetches over HTTP(S) without integrity

    checking. Prefer COPY for local files, and for remote downloads

    use a RUN with curl/wget that pins a checksum.

    '
  metadata:
    cwe: CWE-829
    deva:
      precision_tier: C
  mode: search
  pattern-regex: ^ADD\s+https?://

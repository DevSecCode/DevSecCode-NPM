# AUTO-GENERATED by scripts/expand_rulepacks.py. Do not edit.
rules:
- id: deva.infra.k8s-privileged-container
  languages:
  - yaml
  severity: ERROR
  message: 'Container declared with securityContext.privileged: true. A

    privileged container can access host devices, mount the host

    filesystem, and load kernel modules. Drop the flag and grant

    specific Linux capabilities only as needed.

    '
  metadata:
    cwe: CWE-269
    owasp: A01:2021 - Broken Access Control
    deva:
      precision_tier: A
  mode: search
  pattern-regex: \s+privileged:\s*true
  paths:
    include:
    - '*.yaml'
    - '*.yml'
- id: deva.infra.k8s-run-as-root
  languages:
  - yaml
  severity: WARNING
  message: 'Pod / container has runAsNonRoot disabled or runAsUser pinned to

    0. Runs as root inside the container. Set runAsNonRoot: true and

    runAsUser to a non-zero UID.

    '
  metadata:
    cwe: CWE-250
    deva:
      precision_tier: B
  mode: search
  pattern-either:
  - pattern-regex: \s+runAsNonRoot:\s*false
  - pattern-regex: \s+runAsUser:\s*0\b
  paths:
    include:
    - '*.yaml'
    - '*.yml'
- id: deva.infra.k8s-host-namespaces
  languages:
  - yaml
  severity: ERROR
  message: 'Pod uses host network / PID / IPC namespace. Breaks isolation

    from the underlying node and exposes adjacent workloads.

    '
  metadata:
    cwe: CWE-653
    deva:
      precision_tier: A
  mode: search
  pattern-either:
  - pattern-regex: \s+hostNetwork:\s*true
  - pattern-regex: \s+hostPID:\s*true
  - pattern-regex: \s+hostIPC:\s*true
  paths:
    include:
    - '*.yaml'
    - '*.yml'
